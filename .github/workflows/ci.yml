name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # type-check && lint && test && build
      - name: Verify
        run: npm run verify

      # E2E: drive the built prod server over HTTP. Relies on Verify's
      # `astro build` having produced dist/server/entry.mjs.
      - name: E2E tests
        run: npm run test:e2e
